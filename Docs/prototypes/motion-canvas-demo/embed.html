<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motion Canvas Embed</title>
    <style>
      :root {
        color-scheme: light;
        background: #f6f2e9;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f6f2e9;
      }

      body {
        display: grid;
        place-items: center;
      }

      #player-root {
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="player-root"></div>
    <script type="module" src="/src/embed.ts"></script>
  </body>
</html>
