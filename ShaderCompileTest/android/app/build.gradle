plugins {
    id 'com.android.application'
}

android {
    namespace 'com.psobench.shadercompiletest'
    compileSdk 33
    ndkVersion '21.1.6352462'

    defaultConfig {
        applicationId "com.psobench.shadercompiletest"
        minSdk 24          // Vulkan 1.0 available on API 24+
        targetSdk 33
        versionCode 1
        versionName "1.0"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -O2"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
        ndk {
            abiFilters 'arm64-v8a'  // Modern 64-bit ARM only
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            jniDebuggable true
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.10.2"
        }
    }

    // Copy SPIR-V shaders into assets
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
